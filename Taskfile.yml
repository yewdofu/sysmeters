# vim: set ft=yaml fenc=utf-8 ff=unix sw=2 ts=2 et :
version: "3"

vars:
  APP_NAME: sysmeters
  VERSION:
    sh: git describe --tags --always --dirty | sed 's/^v//'
  ARCH: x64

tasks:
  kill:
    desc: 実行中の sysmeters.exe を強制終了（起動していない場合は無視）
    cmds:
      - cmd: taskkill /IM {{.APP_NAME}}.exe /F
        ignore_error: true

  clean:
    desc: out/ 以下のファイルを削除
    deps: [kill]
    cmds:
      - cmd: pwsh.exe -NoProfile -Command "if (Test-Path out) { Remove-Item -Recurse -Force out }"

  build:
    desc: デバッグビルド（out/sysmeters.exe）
    deps: [kill]
    cmds:
      - cmd: pwsh.exe -NoProfile -File build.ps1 -Version "{{.VERSION}}" -Config Debug
      - cmd: pwsh.exe -NoProfile -Command "Copy-Item '{{.APP_NAME}}.toml' 'out/'"
      - cmd: pwsh.exe -NoProfile -Command "Copy-Item 'data/IntelMSR.bin' 'out/'"
      - cmd: pwsh.exe -NoProfile -Command "Copy-Item 'data/AMDFamily17.bin' 'out/'"
      - cmd: pwsh.exe -NoProfile -Command "Copy-Item 'data/alert.wav' 'out/'"

  rebuild:
    desc: 実行中のバイナリを停止し、クリーンビルドして再起動する
    cmds:
      - cmd: taskkill /IM {{.APP_NAME}}.exe /F
        ignore_error: true
      - task: clean
      - task: build
      - cmd: pwsh.exe -NoProfile -Command "Start-Process 'out/{{.APP_NAME}}.exe'"

  release:
    desc: リリースビルド + zip パッケージング
    deps: [clean]
    cmds:
      - cmd: pwsh.exe -NoProfile -File build.ps1 -Version "{{.VERSION}}" -Config Release
      - cmd: pwsh.exe -NoProfile -Command "Copy-Item '{{.APP_NAME}}.toml' 'out/'"
      - cmd: pwsh.exe -NoProfile -Command "Copy-Item 'data/IntelMSR.bin' 'out/'"
      - cmd: pwsh.exe -NoProfile -Command "Copy-Item 'data/AMDFamily17.bin' 'out/'"
      - cmd: pwsh.exe -NoProfile -Command "Copy-Item 'data/alert.wav' 'out/'"
      - cmd: pwsh.exe -NoProfile -Command "Compress-Archive -Path 'out/{{.APP_NAME}}.exe','out/{{.APP_NAME}}.toml','out/IntelMSR.bin','out/AMDFamily17.bin','out/alert.wav' -DestinationPath 'out/{{.APP_NAME}}-v{{.VERSION}}-{{.ARCH}}.zip' -Force"
      - cmd: echo "Package out/{{.APP_NAME}}-v{{.VERSION}}-{{.ARCH}}.zip"

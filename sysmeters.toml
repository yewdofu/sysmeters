# vim: set ft=toml fenc=utf-8 ff=unix sw=4 ts=4 et :
##################################################
# sysmeters 設定ファイル
##################################################

# ウィンドウ設定
[window]
# ウィンドウ初期表示位置 X 座標（ピクセル）
# デフォルト: 20
x = 20

# ウィンドウ初期表示位置 Y 座標（ピクセル）
# デフォルト: 20
y = 20

# ウィンドウ幅（ピクセル）
# デフォルト: 460
width = 460

# 配色設定
[color]
# 背景色（RGB 16進数、例: 0x1A1A1A）
# デフォルト: 0x1A1A1A（濃いグレー）
background = 0x1A1A1A

# ボーダー・タイトルバー色
# デフォルト: 0x3C3C3C
border = 0x3C3C3C

# テキスト色
# デフォルト: 0xD4D4D4
text = 0xD4D4D4

# 面グラフ色（CPU 全体 / GPU / VRAM）
# デフォルト: 0xCC923E（アンバー）
graph_fill = 0xCC923E

# Disk Read グラフ色
# デフォルト: 0xDDA858（少し明るいアンバー）
disk_read = 0xDDA858

# Disk Write グラフ色
# デフォルト: 0x8C642A（暗めアンバー）
disk_write = 0x8C642A

# Network 受信グラフ色
# デフォルト: 0xDDA858（少し明るいアンバー）
net_recv = 0xDDA858

# Network 送信グラフ色
# デフォルト: 0x8C642A（暗めアンバー）
net_send = 0x8C642A

# Claude レートリミットバー色
# デフォルト: 0xCC923E（アンバー）
claude_bar = 0xCC923E

# CPU コア別縦バー色
# デフォルト: 0xCC923E（アンバー）
cpu_core = 0xCC923E

# 警告色の閾値設定
[threshold]
# CPU 使用率の警告閾値（単位：%）
# この値を超えると CPU 全体/コア別のテキストやバーが赤（0xEF5350）になる
# デフォルト: 95
cpu_pct = 95

# GPU 使用率の警告閾値（単位：%）
# この値を超えると GPU のテキストが赤（0xEF5350）になる
# デフォルト: 95
gpu_pct = 95

# メモリ/ストレージ使用率の警告閾値（単位：%）
# この値を超えると RAM/VRAM/Disk Space のテキストやバーが赤（0xEF5350）になる
# デフォルト: 90
mem_pct = 90

# Claude 5h レートリミットの警告閾値（単位：%）
# この値以上でパーセンテージが太字赤（0xEF5350）になる
# ペースマーカー（緑線）を超えると黄色（0xd7b437）になる（変更不可）
# デフォルト: 90
claude_5h_pct = 90

# Claude 7d レートリミットの警告閾値（単位：%）
# 動作は claude_5h_pct と同様
# デフォルト: 90
claude_7d_pct = 90

# Claude 超過料金の警告閾値（単位：ドル）
# extra_used_dollars がこの値を超えると "over $X.X" テキストが赤（0xEF5350）になる
# デフォルト: 0.0（$0 超えで即赤表示）
claude_over = 0.0

# Disk 書き込み量の警告閾値（単位：GB/h）
# 1 時間あたりの書き込み量がこの値を超えると GB/h テキストが赤（0xEF5350）になる
# デフォルト: 10.0
disk_gbh = 10.0

# 温度の注意閾値（単位：℃）
# CPU/GPU/NVMe 温度がこの値以上でオレンジ（0xFFA726）表示になる
# デフォルト: 70
temp_caution = 70

# 温度の危険閾値（単位：℃）
# CPU/GPU/NVMe 温度がこの値以上で赤（0xEF5350）表示になる
# デフォルト: 90
temp_critical = 90

# OS アップタイムの警告閾値（単位：日）
# 稼働時間がこの日数を超えるとアップタイム表示が赤（0xEF5350）になる
# デフォルト: 7
uptime_days = 7

# ログ設定
[log]
# ログ出力先ディレクトリ
# 相対パスの場合は実行ファイルと同じディレクトリを基準に解決する
# デフォルト: "logs"
dir = "logs"
